<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animal Sounds</title>
    <meta
      name="description"
      content="A very simple baby-friendly animal sound app with category pictures and tappable animal GIFs."
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero hero--simple">
        <p class="hero__eyebrow">Baby mode</p>
        <h1>Animal Sounds</h1>
        <p class="hero__text">Tap a picture.</p>
      </header>

      <main>
        <section id="categoryView" class="view-section">
          <div id="categoryGrid" class="category-grid" aria-label="Categories"></div>
        </section>

        <section id="animalView" class="view-section" hidden>
          <div class="view-topbar">
            <button id="backButton" class="back-button" type="button">Back</button>
            <h2 id="selectedCategoryTitle" class="view-title"></h2>
          </div>

          <section id="animalGrid" class="animal-grid" aria-live="polite"></section>
        </section>
      </main>

      <footer class="page-footer">
        <a class="credits-link" href="credits.html">Credits</a>
      </footer>
    </div>

    <p id="liveStatus" class="sr-only" aria-live="polite"></p>

    <template id="categoryCardTemplate">
      <article class="category-card">
        <button class="category-card__button" type="button">
          <img class="category-card__image" alt="" loading="lazy" />
          <div class="category-card__overlay">
            <h2 class="category-card__name"></h2>
          </div>
        </button>
      </article>
    </template>

    <template id="animalCardTemplate">
      <article class="animal-card">
        <button class="animal-card__button" type="button">
          <img class="animal-card__image" alt="" loading="lazy" />
          <div class="animal-card__overlay">
            <h2 class="animal-card__name"></h2>
          </div>
        </button>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
